# apps/web/nginx.conf —— web 容器的 nginx 配置
#
# 干两件事：
#   1. 静态托管 dist/（SPA：所有非 /api 路径都返 index.html，前端 React Router 接管）
#   2. /api/* 反代到 qa_service:3001（容器网络 DNS）
#      - 关 buffering 让 SSE 长连接（/api/qa/* /api/agent/* /api/notebooks/*）能流式输出
#      - 超时拉到 600s 防止长时间生成被 nginx 切

server {
  listen 80;
  server_name _;

  # 上传 PDF 经 /api/knowledge/ingest 走 multipart，max 默认 1MB 太小
  client_max_body_size 50M;

  # ---------- SPA 静态资源 ----------
  root /usr/share/nginx/html;
  index index.html;

  # 静态资源带强缓存（hashed filename，安全）
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # 其它路径全部回退到 index.html（React Router 接管）
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ---------- /api 反代到 qa-service ----------
  # 所有 22+ 个 /api/* 前缀（auth / qa / agent / knowledge / notebooks / kg / ...）
  # 一条规则覆盖；qa-service 内部路由分发
  location /api/ {
    proxy_pass http://qa_service:3001;
    proxy_http_version 1.1;

    # 透传 host & 真实 IP
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # SSE / 流式响应：关 buffering，关 cache，长超时
    # qa-service 的 /api/qa/ask /api/agent/dispatch /api/notebooks/*/chat 都是 SSE
    proxy_buffering           off;
    proxy_cache               off;
    proxy_read_timeout        600s;
    proxy_send_timeout        600s;
    chunked_transfer_encoding on;
  }

  # ---------- /api/assets/images/:id 也走反代 ----------
  # ADR-44 Citation 透图：浏览器拉缩略图直接走 qa-service 路由
  # 已被上面 /api/ 通配规则覆盖，这里只是注释提醒未来不要拆出来

  # ---------- /healthz 给 docker healthcheck 用（可选）----------
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
