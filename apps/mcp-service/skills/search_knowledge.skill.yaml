name: search_knowledge
version: 1
description: 在知识库中搜索相关内容
legacy_tool_name: search_knowledge
category: legacy

input:
  type: object
  properties:
    query:
      type: string
      description: 搜索关键词
    shelf_id:
      type: number
      description: 限定知识空间 ID（可选）
    count:
      type: number
      description: 返回数量，默认 10
  required:
    - query

output:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          excerpt:
            type: string
          url:
            type: string
          type:
            type: string
          book_name:
            type: string
  required:
    - results

backend:
  kind: hook

auth:
  forward: false
