services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      # BookStack 用 APP_URL 拼所有静态资源绝对 URL（CSS/JS/图标/manifest）。
      # 必须是用户浏览器能访问到的 URL：local 测 = http://localhost:16875；
      # 局域网 / 服务器部署 = http://<服务器 IP>:16875；公网 = https://your-domain.com
      # install-ubuntu.sh 部署时会问一次然后写到 infra/.env（BOOKSTACK_APP_URL=）
      # 不设默认走 localhost:16875，方便本机 dev
      - APP_URL=${BOOKSTACK_APP_URL:-http://localhost:16875}
      # ✅ 你生成的 APP_KEY 已加上（解决启动失败）
      - APP_KEY=base64:0kwUdNlcBIUGGVsJ8Yy9udMR9YcUDIHSDf5aGbEssWU=
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_DATABASE=bookstack
      - DB_USERNAME=bookstack
      - DB_PASSWORD=bookstack_secret
      - ALLOWED_IFRAME_HOSTS=http://localhost:5173 http://localhost:5174 http://localhost:5175 http://localhost:5176
      # 飞书 OIDC
      #- AUTH_METHOD=oidc
      #- OIDC_NAME=飞书登录
      #- OIDC_DISPLAY_NAME_CLAIMS=name
      #- OIDC_ISSUER=https://open.feishu.cn/open-apis/authen/v2
      #- OIDC_CLIENT_ID=${FEISHU_CLIENT_ID}
      #- OIDC_CLIENT_SECRET=${FEISHU_CLIENT_SECRET}
      #- REGISTRATION_ENABLED=true
    volumes:
      - ./bookstack_data:/config
    # UI 暴露给公网（浏览器访问）；端口避让常见 6875 冲突
    ports:
      - "16875:80"
    depends_on:
      bookstack_db:
        condition: service_healthy
    restart: unless-stopped

  # apps/web 的 React + Vite 控制台 —— nginx 静态托管 + /api 反代到 qa_service
  # ADR 2026-04-27（同日 web-static-deploy）：把"知识中台"前端从 host pnpm dev
  # 升级为容器化静态部署，浏览器一开就是登录页
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: zhiyuan_web
    restart: unless-stopped
    # 端口 15173 = 沿用 vite dev 的 5173 + 高端口避让常见冲突
    ports:
      - "15173:80"
    depends_on:
      qa_service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  qa_service:
    build:
      context: ..
      dockerfile: apps/qa-service/Dockerfile
    container_name: qa_service
    restart: unless-stopped
    # 把宿主 .env 挂进容器（覆盖镜像 build 时烤进去的旧值，避免每次 recreate 又回滚）
    # 这是 ADR-44 系列上线后发现的"宿主 .env vs 镜像 .env"漂移防御
    volumes:
      - ../apps/qa-service/.env:/app/apps/qa-service/.env:ro
    # API 暴露给公网（前端 / 客户调用）；端口避让常见 3001 冲突
    ports:
      - "13001:3001"
    environment:
      PORT: "3001"
      # 容器内访问 BookStack（与 bookstack 服务同网络）
      BOOKSTACK_URL: http://bookstack
      # 治理扩展表与 BookStack 共用 MySQL
      DB_HOST: bookstack_db
      DB_PORT: "3306"
      DB_NAME: bookstack
      DB_USER: bookstack
      DB_PASS: bookstack_secret
      # 从 infra/.env 注入（勿提交密钥）
      BOOKSTACK_TOKEN_ID: ${BOOKSTACK_TOKEN_ID:-}
      BOOKSTACK_TOKEN_SECRET: ${BOOKSTACK_TOKEN_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      # ADR-44 系列上线后补：auth secret 透传给 qa-service（不在 environment 块内
      # qa-service 走 dev bypass 模式，生产部署裸放）
      AUTH_HS256_SECRET: ${AUTH_HS256_SECRET:-}
      # 未设置时由 qa-service 按 Base URL 解析（硅基流动默认 Qwen 嵌入）
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      INGEST_MAX_FILE_MB: ${INGEST_MAX_FILE_MB:-50}
      INGEST_OCR: ${INGEST_OCR:-}
      INGEST_EXTRACT_HOOK: ${INGEST_EXTRACT_HOOK:-}
      PG_HOST: pg_db
      PG_PORT: "5432"
      PG_DB: knowledge
      PG_USER: knowledge
      PG_PASS: knowledge_secret
      # Knowledge Graph sidecar (Apache AGE · 可选)
      # 未连通时 runCypher 自动降级到 no-op，不阻塞主流程
      KG_HOST: kg_db
      KG_PORT: "5432"
      KG_DB: kg
      KG_USER: kg
      KG_PASS: kg_secret
      # ⚠ AGE 对 1-2 字符 graph name 会报 "graph name is invalid"，默认用 3 字符以上
      KG_GRAPH: ${KG_GRAPH:-knowledge}
      KG_ENABLED: ${KG_ENABLED:-1}
      # ingest-async-pipeline (ADR-40 · 2026-04-25)：异步 ingest 队列 + worker 调参
      INGEST_ASYNC_ENABLED:           ${INGEST_ASYNC_ENABLED:-true}
      INGEST_ASYNC_THRESHOLD_BYTES:   ${INGEST_ASYNC_THRESHOLD_BYTES:-2097152}
      INGEST_WORKER_CONCURRENCY:      ${INGEST_WORKER_CONCURRENCY:-2}
      INGEST_WORKER_INTERVAL_MS:      ${INGEST_WORKER_INTERVAL_MS:-500}
      INGEST_WORKER_SHUTDOWN_GRACE_MS: ${INGEST_WORKER_SHUTDOWN_GRACE_MS:-30000}
      # OpenViking sidecar (ADR-31 候选 · 2026-04-26)：Agent 跨会话长期记忆
      # 默认 off；显式 VIKING_ENABLED=1 才启用，关闭时 client 全 no-op 不影响主链路
      # 不加 depends_on，故意解耦——viking 没起也能跑 qa-service
      VIKING_ENABLED:           ${VIKING_ENABLED:-0}
      VIKING_BASE_URL:          ${VIKING_BASE_URL:-http://openviking:1933}
      VIKING_ROOT_KEY:          ${VIKING_ROOT_KEY:-}
      VIKING_RECALL_TIMEOUT_MS: ${VIKING_RECALL_TIMEOUT_MS:-200}
      VIKING_SAVE_TIMEOUT_MS:   ${VIKING_SAVE_TIMEOUT_MS:-1000}
      # ingest-l0-abstract (ADR-32 候选 · 2026-04-26)：L0/L1 分级摘要 + RAG L0 粗筛
      # 三档 flag 全关 = 行为字节级 baseline（chunk_abstract 表存在但不读写）
      L0_GENERATE_ENABLED:        ${L0_GENERATE_ENABLED:-true}
      L0_GENERATE_CONCURRENCY:    ${L0_GENERATE_CONCURRENCY:-4}
      L0_GENERATE_MIN_CHARS:      ${L0_GENERATE_MIN_CHARS:-60}
      L0_FILTER_ENABLED:          ${L0_FILTER_ENABLED:-false}
      L0_FILTER_TOP_ASSETS:       ${L0_FILTER_TOP_ASSETS:-50}
      L0_LAZY_BACKFILL_ENABLED:   ${L0_LAZY_BACKFILL_ENABLED:-false}
      # ADR-35（2026-04-26）：QA 联网检索 + 多模态。前端 toggle 触发，后端 env 决定 provider
      # provider=none 时 toggle 仍可点（前端可见），后端跳过实际调用并 emit warn
      WEB_SEARCH_PROVIDER:        ${WEB_SEARCH_PROVIDER:-none}
      TAVILY_API_KEY:             ${TAVILY_API_KEY:-}
      BING_API_KEY:               ${BING_API_KEY:-}
      BING_MARKET:                ${BING_MARKET:-zh-CN}
      WEB_SEARCH_TIMEOUT_MS:      ${WEB_SEARCH_TIMEOUT_MS:-5000}
      WEB_SEARCH_DEFAULT_TOP_K:   ${WEB_SEARCH_DEFAULT_TOP_K:-5}
      # 多模态走 Qwen2.5-VL-72B（已有 INGEST_VLM_MODEL 复用）；图片上限 6MB
      INGEST_VLM_MODEL:           ${INGEST_VLM_MODEL:-Qwen/Qwen2.5-VL-72B-Instruct}
    depends_on:
      bookstack_db:
        condition: service_healthy
      bookstack:
        condition: service_started
      pg_db:
        condition: service_healthy
      kg_db:
        condition: service_started

  bookstack_db:
    image: mysql:8.0
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=bookstack_secret
    volumes:
      - ./mysql_data:/var/lib/mysql
    # MySQL 锁到 127.0.0.1 + 高端口；公网摸不到，仅本机调试用
    # 容器内部 qa_service 走 docker 网络（DB_HOST=bookstack_db, DB_PORT=3306）
    ports:
      - "127.0.0.1:13307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s
    restart: unless-stopped

  pg_db:
    image: pgvector/pgvector:pg16
    container_name: pg_db
    environment:
      - POSTGRES_DB=knowledge
      - POSTGRES_USER=knowledge
      - POSTGRES_PASSWORD=knowledge_secret
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    # 宿主端口锁到 15432 + 127.0.0.1：避开常见 5432 冲突（许多服务器另有 PG）
    # 容器内部仍是 5432，qa_service 走 docker 网络（PG_HOST=pg_db, PG_PORT=5432）不受影响
    # 外网访问不到本端口，仅本机调试用：psql -h 127.0.0.1 -p 15432 -U knowledge -d knowledge
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # Apache AGE sidecar —— 知识图谱专用 PG 实例
  # ADR 2026-04-23-27：与主 pg_db (pgvector) 隔离，方便独立下架/回退
  # 官方镜像已内建 AGE 扩展；容器起来后 qa-service 连进去自动 CREATE EXTENSION age + create_graph('kg')
  #
  # Tag 命名：apache/age 的 tag 格式为 release_PG<pg>_<age>（见 https://hub.docker.com/r/apache/age/tags）
  # 选 1.6.0 + PG16；如要切版本改下面一行即可。
  kg_db:
    image: apache/age:release_PG16_1.6.0
    container_name: kg_db
    environment:
      - POSTGRES_DB=kg
      - POSTGRES_USER=kg
      - POSTGRES_PASSWORD=kg_secret
    volumes:
      - ./kg_data:/var/lib/postgresql/data
    # AGE 锁到 127.0.0.1 + 高端口避让常见 5433 冲突；容器内部走 docker 网络（KG_HOST=kg_db）
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kg -d kg"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # OpenViking sidecar —— Agent 上下文数据库 (memory + L0/L1/L2 分级)
  # ADR 2026-04-26-31 (候选)：方案 A，filesystem 范式 + 跨会话记忆
  # 自建 Dockerfile 见 apps/openviking-service/，复用硅基 Qwen 做 L0/L1
  # 默认不参与 depends_on：关掉 viking 不影响 qa-service 启动
  # 想停掉：docker compose stop openviking
  # 想抹掉所有记忆：rm -rf infra/openviking_data
  openviking:
    build:
      context: ../apps/openviking-service
      dockerfile: Dockerfile
    container_name: openviking
    profiles:
      - viking      # 默认不启动；显式 `--profile viking` 或 `VIKING_ENABLED=1 pnpm stack:up` 才起
    environment:
      # 透传硅基账号给 OpenViking（OpenAI 兼容协议）
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      EMBEDDING_API_KEY:  ${EMBEDDING_API_KEY:-}
      OPENAI_BASE_URL:    ${OPENAI_BASE_URL:-${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}}
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-${EMBEDDING_API_KEY:-}}
      OPENAI_MODEL:       ${VIKING_LLM_MODEL:-Qwen/Qwen2.5-72B-Instruct}
      OPENAI_EMBEDDING_MODEL: ${VIKING_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      VIKING_ROOT_KEY:    ${VIKING_ROOT_KEY:-}
      VIKING_HOST:        0.0.0.0
      VIKING_PORT:        "1933"
      VIKING_DATA_DIR:    /data
    volumes:
      - ./openviking_data:/data
    # OpenViking sidecar 锁到 127.0.0.1（默认不暴露公网）
    ports:
      - "127.0.0.1:11933:1933"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "3", "http://127.0.0.1:1933/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped